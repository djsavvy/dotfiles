# Forward credentials to skill subprocesses. Codex's default shell_environment_policy
# strips KEY/SECRET/TOKEN-named vars from inherited environment when spawning tool
# processes, so they must be either set explicitly here or whitelisted via
# include_only. We do the latter — `ignore_default_excludes = true` disables the
# auto-strip, and `include_only` keeps the inherited set tight so we leak just the
# Farallon-skill keys (sourced from ~/src/applets/.env via the codex-with-env wrapper).
#
# APPLETS_GATEWAY points skill HTTP calls at the local proxy (127.0.0.1:8888),
# which is auto-started by ~/.claude/local-gateway/ensure-running.sh.
[shell_environment_policy]
inherit = "all"
ignore_default_excludes = true
include_only = [
    "PATH", "HOME", "USERPROFILE", "USER", "USERNAME", "HOMEDRIVE", "HOMEPATH",
    "TMP", "TEMP", "TMPDIR", "SYSTEMROOT", "SYSTEMDRIVE", "WINDIR", "COMSPEC",
    "APPDATA", "LOCALAPPDATA", "PROGRAMDATA", "PROGRAMFILES", "PROGRAMFILES(X86)",
    "PROGRAMW6432", "POWERSHELL", "PWSH", "PSMODULEPATH", "OS", "PROCESSOR_*",
    "LANG", "LC_*", "TERM", "TZ", "SHELL", "PWD", "OLDPWD",
    # Farallon skill creds (sourced from ~/src/applets/.env by the launcher)
    "APPLETS_GATEWAY", "DEV_EXPLOR_HOST",
    "EXA_API_KEY", "SEC_API_KEY", "FINANCIAL_MODELING_PREP_API_KEY",
    "QUARTR_API_KEY", "MANA_API_KEY", "EXPLOR_AFFINITY_API_KEY",
    "EXPLOR_AIRTABLE_PAT", "EXPLOR_SERPAPI_API_KEY", "EXPLOR_XAI_API_KEY",
    "YT_TRANSCRIPT_API_KEY", "ARCANA_API", "EXPLOR_API_TOKEN_APPLETS",
    "OCTUS_FUNDAMENTALS_*", "OCTUS_INTEL_*",
    # Cloud / model provider creds codex itself might need
    "AZURE_OPENAI_KEY_*", "GOOGLE_APPLICATION_CREDENTIALS",
    "ANTHROPIC_VERTEX_PROJECT_ID", "CLOUD_ML_REGION", "CLAUDE_CODE_USE_VERTEX",
]

